<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1f2937;
      --muted: #5b6470;
      --paper: #fffdf8;
      --edge: #d7ccbc;
      --brand: #0f766e;
      --brand-2: #c2410c;
      --code-bg: #111827;
      --code-fg: #e5e7eb;
      --link: #0f4c81;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, #ffe4bd 0%, transparent 38%),
        radial-gradient(circle at 88% 12%, #d5e8ff 0%, transparent 35%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.75;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .hero {
      border: 1px solid var(--edge);
      border-radius: 18px;
      background: linear-gradient(120deg, #fff8ec, #f7fbff);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      border: 1px solid #99f6e4;
      background: #ecfeff;
      color: #115e59;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
    }

    .hero h1 {
      margin: 10px 0 0;
      font-size: clamp(26px, 4.1vw, 42px);
      line-height: 1.2;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      letter-spacing: 0.03em;
    }

    main {
      border: 1px solid var(--edge);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: clamp(16px, 3vw, 34px);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      line-height: 1.35;
      margin-top: 1.4em;
      margin-bottom: 0.45em;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(24px, 3vw, 34px);
    }

    h2 {
      border-left: 5px solid var(--brand);
      padding-left: 10px;
      font-size: clamp(22px, 2.6vw, 30px);
    }

    h3 {
      font-size: clamp(18px, 2.2vw, 24px);
      color: #0b3d3a;
    }

    h4,
    h5,
    h6 {
      font-size: 16px;
    }

    p {
      margin: 0 0 0.9em;
    }

    ul,
    ol {
      margin: 0.4em 0 1em;
      padding-left: 1.4em;
    }

    li {
      margin: 0.15em 0;
    }

    blockquote {
      margin: 1em 0;
      border-left: 4px solid var(--brand-2);
      background: #fff8ec;
      border-radius: 10px;
      padding: 10px 14px;
      color: #4b3b2d;
    }

    hr {
      border: 0;
      border-top: 1px solid #ddd4c8;
      margin: 1.8em 0;
    }

    a {
      color: var(--link);
      text-underline-offset: 2px;
    }

    code {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
      background: #eef2f7;
      border-radius: 6px;
      padding: 1px 6px;
    }

    pre {
      margin: 1em 0;
      border-radius: 10px;
      padding: 14px;
      background: var(--code-bg);
      color: var(--code-fg);
      overflow-x: auto;
    }

    pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 14px 10px 36px;
      }

      .hero,
      main {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <span class="badge">Daily Landing</span>
      <h1>{{PAGE_TITLE}}</h1>
      <p class="meta">Generated: {{GENERATED_AT}} (Asia/Tokyo)</p>
    </header>
    <main>
      {{CONTENT_HTML}}
    </main>
  </div>
</body>
</html>
